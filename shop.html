<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Minecraft Club of America</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/icon.ico">
  <style>
    /* ── Shop page styles ── */
    .shop-gate {
      max-width: 480px;
      margin: 6rem auto;
      padding: 0 2.5rem;
      text-align: center;
    }
    .shop-gate-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--green);
      margin-bottom: 1rem;
    }
    .shop-gate h2 {
      font-family: 'Times New Roman', serif;
      font-size: 2rem; color: var(--blue);
      font-weight: normal; margin-bottom: 1rem;
    }
    .shop-gate p {
      color: var(--mid); font-size: 15px;
      line-height: 1.7; margin-bottom: 2rem;
    }
    .shop-gate-actions {
      display: flex; flex-direction: column;
      gap: 12px; align-items: center;
    }
    .btn-discord-login {
      background: #5865F2; color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 11px 24px; border: none;
      border-radius: 4px; cursor: pointer;
      display: inline-flex; align-items: center;
      gap: 8px; transition: background 0.15s;
      text-decoration: none; width: 100%; justify-content: center;
    }
    .btn-discord-login:hover { background: #4752c4; }
    .shop-divider {
      font-size: 11px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
    }
    .email-form { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .email-form input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Open Sans', sans-serif; font-size: 14px;
      background: var(--white); color: var(--black);
      transition: border-color 0.15s;
    }
    .email-form input:focus { outline: none; border-color: var(--blue); }
    .btn-email-login {
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 11px 24px; border: none;
      border-radius: 4px; cursor: pointer;
      transition: background 0.15s; width: 100%;
    }
    .btn-email-login:hover { background: var(--blue-dark); }
    .login-error {
      font-size: 13px; color: #c0392b;
      display: none; text-align: left;
    }

    /* ── Shop content (admin view) ── */
    .shop-wrap { display: none; }
    .shop-hero { border-bottom: 1px solid var(--border); padding: 4rem 2.5rem 3.5rem; max-width: 820px; margin: 0 auto; }
    .shop-hero-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--green);
      margin-bottom: 1rem; display: flex; align-items: center; gap: 10px;
    }
    .shop-hero-eyebrow::after {
      content: ''; display: block; height: 1px;
      width: 40px; background: var(--green); opacity: 0.6;
    }
    .shop-hero h1 {
      font-family: 'Times New Roman', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700; color: var(--blue); margin-bottom: 1rem; line-height: 1.15;
    }
    .shop-hero p { font-size: 16px; color: var(--mid); max-width: 500px; line-height: 1.7; }

    .shop-admin-bar {
      max-width: 820px; margin: 0 auto;
      padding: 1.5rem 2.5rem;
      display: flex; align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .shop-admin-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--green);
      display: flex; align-items: center; gap: 8px;
    }
    .shop-admin-label::before {
      content: ''; display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
    }
    .shop-admin-actions { display: flex; gap: 10px; align-items: center; }
    .btn-add-product {
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 18px; border: none; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-add-product:hover { background: var(--blue-dark); }
    .btn-signout {
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 14px; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .btn-signout:hover { color: var(--black); border-color: var(--muted); }

    /* ── Product grid ── */
    .product-grid-wrap { max-width: 820px; margin: 0 auto; padding: 2.5rem 2.5rem; }
    .product-grid-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 1.5rem;
    }
    .product-grid-title {
      font-family: 'Times New Roman', serif;
      font-size: 1.4rem; color: var(--blue); font-weight: normal;
    }
    .product-count { font-size: 13px; color: var(--muted); }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }
    .product-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .product-card:hover { box-shadow: 0 4px 16px rgba(24,72,158,0.08); border-color: #b8c8e8; }
    .product-card-img {
      width: 100%; height: 180px; object-fit: cover;
      background: var(--bg); display: block;
    }
    .product-card-img-placeholder {
      width: 100%; height: 180px;
      background: var(--bg); display: flex;
      align-items: center; justify-content: center;
      color: var(--border);
    }
    .product-card-img-placeholder svg { width: 40px; height: 40px; }
    .product-card-body { padding: 1rem; }
    .product-card-category {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--green); margin-bottom: 4px;
    }
    .product-card-name {
      font-family: 'Times New Roman', serif;
      font-size: 1.1rem; color: var(--blue);
      font-weight: normal; margin-bottom: 4px; line-height: 1.3;
    }
    .product-card-desc {
      font-size: 12px; color: var(--muted);
      line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .product-card-price {
      font-size: 15px; font-weight: 600; color: var(--black);
    }
    .product-card-stock {
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
    .product-card-stock.low { color: #e67e22; }
    .product-card-stock.out { color: #c0392b; }
    .product-card-actions {
      display: flex; gap: 6px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .btn-card-edit, .btn-card-delete {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      padding: 5px 12px; border-radius: 3px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-card-edit {
      background: transparent; color: var(--blue);
      border: 1px solid var(--border);
    }
    .btn-card-edit:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-card-delete {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-card-delete:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    .product-empty {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 0; color: var(--muted);
    }
    .product-empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
    .product-empty p { font-size: 15px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,15,30,0.5); z-index: 200;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 8px;
      border: 1px solid var(--border);
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(10,15,30,0.2);
    }
    .modal-header {
      padding: 1.5rem 1.5rem 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family: 'Times New Roman', serif;
      font-size: 1.3rem; color: var(--blue); font-weight: normal;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 20px; line-height: 1;
      padding: 4px; border-radius: 3px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--black); }
    .modal-body { padding: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--mid);
      margin-bottom: 5px; text-transform: uppercase;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Open Sans', sans-serif; font-size: 14px;
      background: var(--white); color: var(--black);
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--blue);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer {
      padding: 0 1.5rem 1.5rem;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-modal-cancel {
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; transition: color 0.15s;
    }
    .btn-modal-cancel:hover { color: var(--black); }
    .btn-modal-save {
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: none;
      border-radius: 4px; cursor: pointer; transition: background 0.15s;
    }
    .btn-modal-save:hover { background: var(--blue-dark); }
    .modal-save-error {
      font-size: 13px; color: #c0392b;
      padding: 0 1.5rem 1rem; display: none;
    }

    /* ── Loading ── */
    .shop-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; color: var(--muted); font-size: 14px;
      flex-direction: column; gap: 12px;
    }
    .shop-loading-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .shop-admin-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div class="page-wrap">

  <!-- Loading state -->
  <div class="shop-loading" id="shop-loading">
    <div class="shop-loading-spinner"></div>
    <span>Checking access...</span>
  </div>

  <!-- Login gate (shown if not admin) -->
  <div class="shop-gate" id="shop-gate" style="display:none;">
    <div class="shop-gate-eyebrow">MCA Shop</div>
    <h2>Admin Access Required</h2>
    <p>The shop is currently in admin-only mode. Sign in to continue.</p>
    <div class="shop-gate-actions">
      <button class="btn-discord-login" id="btn-discord-login">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Continue with Discord
      </button>
      <div class="shop-divider">or</div>
      <div class="email-form">
        <input type="email" id="login-email" class="form-input" placeholder="Email address">
        <input type="password" id="login-password" class="form-input" placeholder="Password">
        <div class="login-error" id="login-error"></div>
        <button class="btn-email-login" id="btn-email-login">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Shop content (admin only) -->
  <div class="shop-wrap" id="shop-wrap">

    <div class="shop-hero">
      <div class="shop-hero-eyebrow">Admin</div>
      <h1>MCA Shop</h1>
      <p>Manage products, inventory, and listings. The shop is currently in admin-only mode.</p>
    </div>

    <div class="shop-admin-bar">
      <div class="shop-admin-label">Admin Mode</div>
      <div class="shop-admin-actions">
        <button class="btn-add-product" id="btn-add-product">+ Add Product</button>
        <button class="btn-signout" id="btn-signout">Sign Out</button>
      </div>
    </div>

    <div class="product-grid-wrap">
      <div class="product-grid-header">
        <div class="product-grid-title">Products</div>
        <div class="product-count" id="product-count"></div>
      </div>
      <div class="product-grid" id="product-grid">
        <!-- products injected here -->
      </div>
    </div>

  </div>

</div><!-- /.page-wrap -->

<!-- Add / Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-product-id">
      <div class="form-group">
        <label class="form-label" for="modal-name">Product Name</label>
        <input type="text" id="modal-name" class="form-input" placeholder="e.g. MCA Logo T-Shirt">
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-desc">Description</label>
        <textarea id="modal-desc" class="form-textarea" placeholder="Short product description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-price">Price (USD)</label>
          <input type="number" id="modal-price" class="form-input" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-inventory">Inventory</label>
          <input type="number" id="modal-inventory" class="form-input" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-category">Category</label>
          <input type="text" id="modal-category" class="form-input" placeholder="e.g. Apparel, 3D Print">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-active">Status</label>
          <select id="modal-active" class="form-select">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-image">Image URL</label>
        <input type="text" id="modal-image" class="form-input" placeholder="https://...">
      </div>
    </div>
    <div class="modal-save-error" id="modal-save-error"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-modal-save" id="modal-save">Save Product</button>
    </div>
  </div>
</div>

<script type="module">
  import { supabase, isAdmin, signInWithDiscord, signInWithEmail, signOut } from './supabase.js';

  const elLoading   = document.getElementById('shop-loading');
  const elGate      = document.getElementById('shop-gate');
  const elShop      = document.getElementById('shop-wrap');
  const elGrid      = document.getElementById('product-grid');
  const elCount     = document.getElementById('product-count');
  const elModal     = document.getElementById('product-modal');
  const elModalTitle = document.getElementById('modal-title');

  // ── Auth gate ────────────────────────────────────────────────
  async function init() {
    const admin = await isAdmin();
    elLoading.style.display = 'none';
    if (admin) {
      elShop.style.display = 'block';
      loadProducts();
    } else {
      elGate.style.display = 'block';
    }
  }

  // Handle OAuth redirect
  supabase.auth.onAuthStateChange(async (event) => {
    if (event === 'SIGNED_IN') {
      elGate.style.display = 'none';
      elLoading.style.display = 'flex';
      const admin = await isAdmin();
      elLoading.style.display = 'none';
      if (admin) {
        elShop.style.display = 'block';
        loadProducts();
      } else {
        elGate.style.display = 'block';
        document.getElementById('login-error').textContent = 'Your account does not have admin access.';
        document.getElementById('login-error').style.display = 'block';
      }
    }
  });

  init();

  // ── Login handlers ───────────────────────────────────────────
  document.getElementById('btn-discord-login').addEventListener('click', signInWithDiscord);

  document.getElementById('btn-email-login').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      await signInWithEmail(email, password);
    } catch (e) {
      errEl.textContent = e.message || 'Sign in failed.';
      errEl.style.display = 'block';
    }
  });

  // ── Sign out ─────────────────────────────────────────────────
  document.getElementById('btn-signout').addEventListener('click', async () => {
    await signOut();
    elShop.style.display = 'none';
    elGate.style.display = 'block';
  });

  // ── Load products ────────────────────────────────────────────
  async function loadProducts() {
    const { data, error } = await supabase
      .from('products')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      elGrid.innerHTML = `<div class="product-empty"><p>Error loading products: ${error.message}</p></div>`;
      return;
    }

    elCount.textContent = data.length === 1 ? '1 product' : `${data.length} products`;

    if (data.length === 0) {
      elGrid.innerHTML = `
        <div class="product-empty">
          <div class="product-empty-icon">📦</div>
          <p>No products yet. Add your first one above.</p>
        </div>`;
      return;
    }

    elGrid.innerHTML = data.map(p => `
      <div class="product-card" data-id="${p.id}">
        ${p.image_url
          ? `<img class="product-card-img" src="${p.image_url}" alt="${p.name}">`
          : `<div class="product-card-img-placeholder">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg>
             </div>`}
        <div class="product-card-body">
          ${p.category ? `<div class="product-card-category">${p.category}</div>` : ''}
          <div class="product-card-name">${p.name}</div>
          ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
          <div class="product-card-footer">
            <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
            <div class="product-card-stock ${p.inventory === 0 ? 'out' : p.inventory < 5 ? 'low' : ''}">
              ${p.inventory === 0 ? 'Out of stock' : `${p.inventory} in stock`}
            </div>
          </div>
          <div class="product-card-actions">
            <button class="btn-card-edit" onclick="openEdit('${p.id}')">Edit</button>
            <button class="btn-card-delete" onclick="deleteProduct('${p.id}')">Delete</button>
          </div>
        </div>
      </div>`).join('');
  }

  // ── Modal ────────────────────────────────────────────────────
  function openModal(product = null) {
    document.getElementById('modal-product-id').value  = product?.id || '';
    document.getElementById('modal-name').value        = product?.name || '';
    document.getElementById('modal-desc').value        = product?.description || '';
    document.getElementById('modal-price').value       = product?.price || '';
    document.getElementById('modal-inventory').value   = product?.inventory ?? '';
    document.getElementById('modal-category').value    = product?.category || '';
    document.getElementById('modal-active').value      = product ? String(product.active) : 'true';
    document.getElementById('modal-image').value       = product?.image_url || '';
    document.getElementById('modal-save-error').style.display = 'none';
    elModalTitle.textContent = product ? 'Edit Product' : 'Add Product';
    elModal.classList.add('open');
  }

  function closeModal() { elModal.classList.remove('open'); }

  document.getElementById('btn-add-product').addEventListener('click', () => openModal());
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  elModal.addEventListener('click', e => { if (e.target === elModal) closeModal(); });

  document.getElementById('modal-save').addEventListener('click', async () => {
    const id        = document.getElementById('modal-product-id').value;
    const name      = document.getElementById('modal-name').value.trim();
    const desc      = document.getElementById('modal-desc').value.trim();
    const price     = parseFloat(document.getElementById('modal-price').value);
    const inventory = parseInt(document.getElementById('modal-inventory').value, 10);
    const category  = document.getElementById('modal-category').value.trim();
    const active    = document.getElementById('modal-active').value === 'true';
    const image_url = document.getElementById('modal-image').value.trim();
    const errEl     = document.getElementById('modal-save-error');

    if (!name || isNaN(price) || isNaN(inventory)) {
      errEl.textContent = 'Name, price, and inventory are required.';
      errEl.style.display = 'block';
      return;
    }

    const payload = { name, description: desc || null, price, inventory, category: category || null, active, image_url: image_url || null };

    const { error } = id
      ? await supabase.from('products').update(payload).eq('id', id)
      : await supabase.from('products').insert(payload);

    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      return;
    }

    closeModal();
    loadProducts();
  });

  // ── Edit / Delete (called from inline onclick) ───────────────
  window.openEdit = async (id) => {
    const { data } = await supabase.from('products').select('*').eq('id', id).single();
    if (data) openModal(data);
  };

  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product? This cannot be undone.')) return;
    await supabase.from('products').delete().eq('id', id);
    loadProducts();
  };
</script>

</body>
</html>
