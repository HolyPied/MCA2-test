<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Minecraft Club of America</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/icon.ico">
  <style>
    /* ── Shop page styles ── */

    /* ── Member view banner (shown when admin previews as member) ── */
    .member-preview-bar {
      background: #1a2035;
      color: #e8eaf0;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 9px 2.5rem;
      gap: 12px;
      position: sticky;
      top: 58px;
      z-index: 90;
    }
    .member-preview-bar.active { display: flex; }
    .member-preview-label {
      display: flex; align-items: center; gap: 8px;
    }
    .member-preview-label::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .btn-back-admin {
      background: var(--blue); color: #fff;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 6px 16px; border: none;
      border-radius: 3px; cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-back-admin:hover { background: var(--blue-dark); }

    /* ── Shop hero ── */
    .shop-wrap { display: block; }
    .shop-hero {
      border-bottom: 1px solid var(--border);
      padding: 4rem 2.5rem 3.5rem;
      max-width: 820px; margin: 0 auto;
    }
    .shop-hero-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--green);
      margin-bottom: 1rem; display: flex; align-items: center; gap: 10px;
    }
    .shop-hero-eyebrow::after {
      content: ''; display: block; height: 1px;
      width: 40px; background: var(--green); opacity: 0.6;
    }
    .shop-hero h1 {
      font-family: 'Times New Roman', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700; color: var(--blue); margin-bottom: 1rem; line-height: 1.15;
    }
    .shop-hero p {
      font-size: 16px; color: var(--mid); max-width: 500px; line-height: 1.7;
    }

    /* ── Admin bar (only shown when admin is logged in AND not in member preview) ── */
    .shop-admin-bar {
      max-width: 820px; margin: 0 auto;
      padding: 1.5rem 2.5rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .shop-admin-bar.visible { display: flex; }
    .shop-admin-left {
      display: flex; align-items: center; gap: 18px;
    }
    .shop-admin-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--green);
      display: flex; align-items: center; gap: 8px;
    }
    .shop-admin-label::before {
      content: ''; display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
    }

    /* Add to Cart toggle (admin control) */
    .cart-toggle-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .cart-toggle-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--muted); text-transform: uppercase;
    }
    .toggle-switch {
      position: relative; display: inline-block;
      width: 36px; height: 20px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer;
      inset: 0; background: var(--border);
      border-radius: 20px; transition: background 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--green); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

    .shop-admin-actions { display: flex; gap: 10px; align-items: center; }
    .btn-view-as-member {
      background: transparent; color: var(--blue);
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 16px; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-view-as-member:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-add-product {
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 18px; border: none; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-add-product:hover { background: var(--blue-dark); }
    .btn-signout {
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 14px; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-signout:hover { color: var(--black); border-color: var(--muted); }

    /* ── Product grid ── */
    .product-grid-wrap {
      max-width: 820px; margin: 0 auto; padding: 2.5rem 2.5rem;
    }
    .product-grid-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 1.5rem;
    }
    .product-grid-title {
      font-family: 'Times New Roman', serif;
      font-size: 1.4rem; color: var(--blue); font-weight: normal;
    }
    .product-count { font-size: 13px; color: var(--muted); }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }
    .product-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .product-card:hover {
      box-shadow: 0 4px 16px rgba(24,72,158,0.08);
      border-color: #b8c8e8;
    }
    .product-card-img {
      width: 100%; height: 180px; object-fit: cover;
      background: var(--bg); display: block;
    }
    .product-card-img-placeholder {
      width: 100%; height: 180px;
      background: var(--bg); display: flex;
      align-items: center; justify-content: center;
      color: var(--border);
    }
    .product-card-img-placeholder svg { width: 40px; height: 40px; }
    .product-card-body { padding: 1rem; }
    .product-card-category {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--green); margin-bottom: 4px;
    }
    .product-card-name {
      font-family: 'Times New Roman', serif;
      font-size: 1.1rem; color: var(--blue);
      font-weight: normal; margin-bottom: 4px; line-height: 1.3;
    }
    .product-card-desc {
      font-size: 12px; color: var(--muted);
      line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .product-card-price {
      font-size: 15px; font-weight: 600; color: var(--black);
    }
    .product-card-stock {
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
    .product-card-stock.low { color: #e67e22; }
    .product-card-stock.out { color: #c0392b; }

    /* Add to Cart button — shown/hidden by JS state */
    .btn-add-to-cart {
      width: 100%; margin-top: 10px;
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 0; border: none; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
      display: none; /* hidden by default; JS enables */
    }
    .btn-add-to-cart:hover { background: var(--blue-dark); }
    .btn-add-to-cart:disabled {
      background: var(--border); color: var(--muted); cursor: not-allowed;
    }
    .cart-enabled .btn-add-to-cart { display: block; }

    /* Admin-only card actions */
    .product-card-actions {
      display: none;
      gap: 6px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .admin-mode .product-card-actions { display: flex; }
    /* In member preview, hide admin actions even if admin-mode class lingers */
    .member-preview .product-card-actions { display: none !important; }

    .btn-card-edit, .btn-card-delete {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      padding: 5px 12px; border-radius: 3px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-card-edit {
      background: transparent; color: var(--blue);
      border: 1px solid var(--border);
    }
    .btn-card-edit:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-card-delete {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-card-delete:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    .product-empty {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 0; color: var(--muted);
    }
    .product-empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
    .product-empty p { font-size: 15px; }

    /* ── Admin login gate (for the admin sign-in bar only) ── */
    .admin-login-strip {
      max-width: 820px; margin: 0 auto;
      padding: 1rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: none;
      align-items: center; gap: 12px;
    }
    .admin-login-strip.visible { display: flex; }
    .admin-login-strip-label {
      font-size: 12px; color: var(--muted); flex-shrink: 0;
    }
    .admin-login-strip-fields {
      display: flex; gap: 8px; flex: 1; flex-wrap: wrap;
    }
    .admin-strip-input {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 4px; font-family: 'Open Sans', sans-serif;
      font-size: 13px; background: var(--white); color: var(--black);
      transition: border-color 0.15s;
    }
    .admin-strip-input:focus { outline: none; border-color: var(--blue); }
    .btn-strip-discord {
      background: #5865F2; color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 7px 14px; border: none; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-strip-discord:hover { background: #4752c4; }
    .btn-strip-email {
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 7px 14px; border: none; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-strip-email:hover { background: var(--blue-dark); }
    .strip-error {
      font-size: 12px; color: #c0392b; display: none;
    }
    .strip-toggle-link {
      font-size: 12px; color: var(--blue); cursor: pointer;
      text-decoration: underline; white-space: nowrap;
      background: none; border: none; padding: 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,15,30,0.5); z-index: 200;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 8px;
      border: 1px solid var(--border);
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(10,15,30,0.2);
    }
    .modal-header {
      padding: 1.5rem 1.5rem 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family: 'Times New Roman', serif;
      font-size: 1.3rem; color: var(--blue); font-weight: normal;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 20px; line-height: 1;
      padding: 4px; border-radius: 3px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--black); }
    .modal-body { padding: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--mid);
      margin-bottom: 5px; text-transform: uppercase;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Open Sans', sans-serif; font-size: 14px;
      background: var(--white); color: var(--black);
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--blue);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer {
      padding: 0 1.5rem 1.5rem;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-modal-cancel {
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; transition: color 0.15s;
    }
    .btn-modal-cancel:hover { color: var(--black); }
    .btn-modal-save {
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: none;
      border-radius: 4px; cursor: pointer; transition: background 0.15s;
    }
    .btn-modal-save:hover { background: var(--blue-dark); }
    .modal-save-error {
      font-size: 13px; color: #c0392b;
      padding: 0 1.5rem 1rem; display: none;
    }

    /* ── Loading ── */
    .shop-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 40vh; color: var(--muted); font-size: 14px;
      flex-direction: column; gap: 12px;
    }
    .shop-loading-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .shop-admin-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
      .admin-login-strip { flex-direction: column; align-items: flex-start; }
      .admin-login-strip-fields { width: 100%; }
      .admin-strip-input { width: 100%; }
      .member-preview-bar { top: 58px; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div class="page-wrap">

  <!-- Member preview banner (only shown to admins in preview mode) -->
  <div class="member-preview-bar" id="member-preview-bar">
    <div class="member-preview-label">Previewing as Member</div>
    <button class="btn-back-admin" id="btn-back-admin">← Back to Admin View</button>
  </div>

  <!-- Auth check spinner -->
  <div class="shop-loading" id="shop-loading">
    <div class="shop-loading-spinner"></div>
    <span>Loading shop...</span>
  </div>

  <!-- Shop content (public — always shown once loaded) -->
  <div class="shop-wrap" id="shop-wrap" style="display:none;">

    <div class="shop-hero">
      <div class="shop-hero-eyebrow">MCA Shop</div>
      <h1>MCA Shop</h1>
      <p>Official Minecraft Club of America merchandise. More items coming soon.</p>
    </div>

    <!-- Admin bar: only visible to logged-in admins, hidden in member preview -->
    <div class="shop-admin-bar" id="shop-admin-bar">
      <div class="shop-admin-left">
        <div class="shop-admin-label">Admin Mode</div>
        <div class="cart-toggle-wrap" title="Toggle 'Add to Cart' button visibility for all visitors">
          <span class="cart-toggle-label">Add to Cart</span>
          <label class="toggle-switch">
            <input type="checkbox" id="cart-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="shop-admin-actions">
        <button class="btn-view-as-member" id="btn-view-as-member">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View as Member
        </button>
        <button class="btn-add-product" id="btn-add-product">+ Add Product</button>
        <button class="btn-signout" id="btn-signout">Sign Out</button>
      </div>
    </div>


    <div class="product-grid-wrap">
      <div class="product-grid-header">
        <div class="product-grid-title">Products</div>
        <div class="product-count" id="product-count"></div>
      </div>
      <div class="product-grid" id="product-grid">
        <!-- products injected here -->
      </div>
    </div>

  </div>

</div><!-- /.page-wrap -->

<!-- Cart drawer -->
<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <div class="cart-drawer-title">Your Cart</div>
    <button class="cart-drawer-close" id="cart-drawer-close">✕</button>
  </div>
  <div class="cart-drawer-body" id="cart-drawer-body">
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty.</p>
    </div>
  </div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none;">
    <div class="cart-subtotal">
      <span class="cart-subtotal-label">Subtotal</span>
      <span class="cart-subtotal-amount" id="cart-subtotal">$0.00</span>
    </div>
    <button class="btn-checkout" id="btn-checkout">Checkout — Coming Soon</button>
  </div>
</div>

<!-- Add / Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-product-id">
      <div class="form-group">
        <label class="form-label" for="modal-name">Product Name</label>
        <input type="text" id="modal-name" class="form-input" placeholder="e.g. MCA Logo T-Shirt">
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-desc">Description</label>
        <textarea id="modal-desc" class="form-textarea" placeholder="Short product description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-price">Price (USD)</label>
          <input type="number" id="modal-price" class="form-input" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-inventory">Inventory</label>
          <input type="number" id="modal-inventory" class="form-input" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-category">Category</label>
          <input type="text" id="modal-category" class="form-input" placeholder="e.g. Apparel, 3D Print">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-active">Status</label>
          <select id="modal-active" class="form-select">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-image">Image URL</label>
        <input type="text" id="modal-image" class="form-input" placeholder="https://...">
      </div>
    </div>
    <div class="modal-save-error" id="modal-save-error"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-modal-save" id="modal-save">Save Product</button>
    </div>
  </div>
</div>

<script type="module">
  import { supabase, isAdmin, signInWithDiscord, signInWithEmail, signOut } from './supabase.js';

  // ── State
  let _isAdmin = false, _isLoggedIn = false, _userId = null, _memberPreview = false, _cartEnabled = false;

  // ── Cart helpers
  function cartKey() { return 'mca_cart_' + _userId; }
  function getCart() {
    if (!_userId) return [];
    try { return JSON.parse(localStorage.getItem(cartKey())) || []; } catch(e) { return []; }
  }
  function saveCart(items) {
    if (!_userId) return;
    localStorage.setItem(cartKey(), JSON.stringify(items));
    if (window._mcaUpdateCartBadge) window._mcaUpdateCartBadge();
  }
  function addToCart(product) {
    const items = getCart();
    const ex = items.find(i => i.id === product.id);
    if (ex) { ex.qty = (ex.qty || 1) + 1; } else { items.push({...product, qty: 1}); }
    saveCart(items);
    renderCartDrawer();
    openCartDrawer();
  }
  function removeFromCart(id) { saveCart(getCart().filter(i => i.id !== id)); renderCartDrawer(); }
  function changeQty(id, d) {
    const items = getCart(), item = items.find(i => i.id === id);
    if (!item) return;
    item.qty = Math.max(1, (item.qty || 1) + d);
    saveCart(items); renderCartDrawer();
  }
  window.cartQty    = (id, d) => changeQty(id, d);
  window.cartRemove = (id)    => removeFromCart(id);
  window.shopAddToCart = (p)  => addToCart(p);

  // ── Cart drawer
  const elCartOverlay  = document.getElementById('cart-overlay');
  const elCartDrawer   = document.getElementById('cart-drawer');
  const elCartBody     = document.getElementById('cart-drawer-body');
  const elCartFooter   = document.getElementById('cart-drawer-footer');
  const elCartSubtotal = document.getElementById('cart-subtotal');

  function openCartDrawer()  { elCartOverlay.classList.add('open'); elCartDrawer.classList.add('open'); }
  function closeCartDrawer() { elCartOverlay.classList.remove('open'); elCartDrawer.classList.remove('open'); }

  document.getElementById('cart-drawer-close').addEventListener('click', closeCartDrawer);
  elCartOverlay.addEventListener('click', closeCartDrawer);

  const navCartBtn = document.getElementById('nav-cart-btn');
  if (navCartBtn) navCartBtn.addEventListener('click', () => { renderCartDrawer(); openCartDrawer(); });

  function renderCartDrawer() {
    const items = getCart();
    if (items.length === 0) {
      elCartBody.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty.</p></div>';
      elCartFooter.style.display = 'none'; return;
    }
    const sub = items.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
    elCartBody.innerHTML = items.map(i => `
      <div class="cart-item" data-id="${i.id}">
        ${i.image_url
          ? `<img class="cart-item-img" src="${i.image_url}" alt="${i.name}">`
          : `<div class="cart-item-img-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-price">$${Number(i.price).toFixed(2)} each</div>
          <div class="cart-item-controls">
            <button class="cart-qty-btn" onclick="cartQty('${i.id}',-1)">−</button>
            <span class="cart-qty">${i.qty || 1}</span>
            <button class="cart-qty-btn" onclick="cartQty('${i.id}',1)">+</button>
            <button class="cart-item-remove" onclick="cartRemove('${i.id}')">Remove</button>
          </div>
        </div>
      </div>`).join('');
    elCartSubtotal.textContent = '$' + sub.toFixed(2);
    elCartFooter.style.display = '';
  }

  // ── Element refs
  const elLoading    = document.getElementById('shop-loading');
  const elShop       = document.getElementById('shop-wrap');
  const elAdminBar   = document.getElementById('shop-admin-bar');
  const elPreviewBar = document.getElementById('member-preview-bar');
  const elGrid       = document.getElementById('product-grid');
  const elCount      = document.getElementById('product-count');
  const elModal      = document.getElementById('product-modal');
  const elModalTitle = document.getElementById('modal-title');
  const elCartToggle = document.getElementById('cart-toggle');

  // ── Apply state to DOM
  function applyState() {
    const showAdmin = _isAdmin && !_memberPreview;
    elAdminBar.classList.toggle('visible', showAdmin);
    elPreviewBar.classList.toggle('active', _isAdmin && _memberPreview);
    document.body.classList.toggle('admin-mode', showAdmin);
    document.body.classList.toggle('member-preview', _memberPreview);
    document.body.classList.toggle('cart-enabled', _cartEnabled);
    elCartToggle.checked = _cartEnabled;
  }

  // ── Auth init
  async function init(user) {
    _isLoggedIn  = !!user;
    _userId      = user?.id || null;
    _isAdmin     = _isLoggedIn ? await isAdmin() : false;
    _cartEnabled = localStorage.getItem('mca_cart_enabled') === 'true';
    elLoading.style.display = 'none';
    elShop.style.display    = 'block';
    applyState();
    loadProducts();
  }

  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
      await init(session?.user || null);
    } else if (event === 'SIGNED_OUT') {
      _isAdmin = false; _isLoggedIn = false; _userId = null; _memberPreview = false;
      elLoading.style.display = 'none'; elShop.style.display = 'block';
      applyState(); loadProducts();
    }
  });

  // ── Cart toggle
  elCartToggle.addEventListener('change', () => {
    _cartEnabled = elCartToggle.checked;
    localStorage.setItem('mca_cart_enabled', _cartEnabled);
    applyState();
    loadProducts();
  });

  // ── View as Member / Back to Admin
  document.getElementById('btn-view-as-member').addEventListener('click', () => { _memberPreview = true; applyState(); loadProducts(); });
  document.getElementById('btn-back-admin').addEventListener('click',     () => { _memberPreview = false; applyState(); loadProducts(); });

  document.getElementById('btn-signout').addEventListener('click', async () => await signOut());

  // ── Load products
  async function loadProducts() {
    const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
    if (error) { elGrid.innerHTML = `<div class="product-empty"><p>Error: ${error.message}</p></div>`; return; }

    const visible = _isAdmin ? data : data.filter(p => p.active);
    elCount.textContent = visible.length === 1 ? '1 product' : `${visible.length} products`;

    if (visible.length === 0) {
      elGrid.innerHTML = `<div class="product-empty"><div class="product-empty-icon">📦</div><p>${_isAdmin ? 'No products yet. Add your first one above.' : 'No products available yet.'}</p></div>`;
      return;
    }

    const showAdmin = _isAdmin && !_memberPreview;

    elGrid.innerHTML = visible.map(p => {
      let cartBtn = '';
      if (_cartEnabled) {
        if (_isLoggedIn) {
          const prod = JSON.stringify({id:p.id, name:p.name, price:p.price, image_url:p.image_url||null}).replace(/'/g, "\'");
          cartBtn = `<button class="btn-add-to-cart" style="display:block;" ${p.inventory === 0 ? 'disabled' : ''} onclick="shopAddToCart(${prod.replace(/"/g, '&quot;')})">
            ${p.inventory === 0 ? 'Out of Stock' : 'Add to Cart'}
          </button>`;
        } else {
          cartBtn = `<a class="btn-add-to-cart" href="login.html?return=shop.html" style="display:block;text-align:center;text-decoration:none;line-height:2.2;">Sign In to Add to Cart</a>`;
        }
      }
      return `<div class="product-card" data-id="${p.id}">
        ${p.image_url ? `<img class="product-card-img" src="${p.image_url}" alt="${p.name}">` : `<div class="product-card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg></div>`}
        <div class="product-card-body">
          ${p.category ? `<div class="product-card-category">${p.category}</div>` : ''}
          <div class="product-card-name">${p.name}</div>
          ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
          <div class="product-card-footer">
            <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
            <div class="product-card-stock ${p.inventory===0?'out':p.inventory<5?'low':''}">${p.inventory===0?'Out of stock':`${p.inventory} in stock`}</div>
          </div>
          ${cartBtn}
          ${showAdmin ? `<div class="product-card-actions" style="display:flex;">
            <button class="btn-card-edit" onclick="openEdit('${p.id}')">Edit</button>
            <button class="btn-card-delete" onclick="deleteProduct('${p.id}')">Delete</button>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ── Modal
  function openModal(product = null) {
    document.getElementById('modal-product-id').value = product?.id || '';
    document.getElementById('modal-name').value       = product?.name || '';
    document.getElementById('modal-desc').value       = product?.description || '';
    document.getElementById('modal-price').value      = product?.price || '';
    document.getElementById('modal-inventory').value  = product?.inventory ?? '';
    document.getElementById('modal-category').value   = product?.category || '';
    document.getElementById('modal-active').value     = product ? String(product.active) : 'true';
    document.getElementById('modal-image').value      = product?.image_url || '';
    document.getElementById('modal-save-error').style.display = 'none';
    elModalTitle.textContent = product ? 'Edit Product' : 'Add Product';
    elModal.classList.add('open');
  }
  function closeModal() { elModal.classList.remove('open'); }

  document.getElementById('btn-add-product').addEventListener('click', () => openModal());
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  elModal.addEventListener('click', e => { if (e.target === elModal) closeModal(); });

  document.getElementById('modal-save').addEventListener('click', async () => {
    const id        = document.getElementById('modal-product-id').value;
    const name      = document.getElementById('modal-name').value.trim();
    const desc      = document.getElementById('modal-desc').value.trim();
    const price     = parseFloat(document.getElementById('modal-price').value);
    const inventory = parseInt(document.getElementById('modal-inventory').value, 10);
    const category  = document.getElementById('modal-category').value.trim();
    const active    = document.getElementById('modal-active').value === 'true';
    const image_url = document.getElementById('modal-image').value.trim();
    const errEl     = document.getElementById('modal-save-error');
    if (!name || isNaN(price) || isNaN(inventory)) { errEl.textContent = 'Name, price, and inventory are required.'; errEl.style.display = 'block'; return; }
    const payload = { name, description: desc||null, price, inventory, category: category||null, active, image_url: image_url||null };
    const { error } = id
      ? await supabase.from('products').update(payload).eq('id', id)
      : await supabase.from('products').insert(payload);
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
    closeModal(); loadProducts();
  });

  window.openEdit = async (id) => {
    const { data } = await supabase.from('products').select('*').eq('id', id).single();
    if (data) openModal(data);
  };
  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product? This cannot be undone.')) return;
    await supabase.from('products').delete().eq('id', id);
    loadProducts();
  };
</script>

</body>
</html>
