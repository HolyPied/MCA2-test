<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Minecraft Club of America</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/icon.ico">
  <style>
    .member-preview-bar {
      background: #1a2035; color: #e8eaf0;
      font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      display: none; align-items: center; justify-content: space-between;
      padding: 9px 2.5rem; gap: 12px; position: sticky; top: 58px; z-index: 90;
    }
    .member-preview-bar.active { display: flex; }
    .member-preview-label { display: flex; align-items: center; gap: 8px; }
    .member-preview-label::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); }
    .btn-back-admin { background:var(--blue); color:#fff; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:6px 16px; border:none; border-radius:3px; cursor:pointer; transition:background .15s; white-space:nowrap; }
    .btn-back-admin:hover { background:var(--blue-dark); }

    .shop-hero { border-bottom:1px solid var(--border); padding:4rem 2.5rem 3.5rem; max-width:860px; margin:0 auto; }
    .shop-hero-eyebrow { font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--green); margin-bottom:1rem; display:flex; align-items:center; gap:10px; }
    .shop-hero-eyebrow::after { content:''; display:block; height:1px; width:40px; background:var(--green); opacity:.6; }
    .shop-hero h1 { font-family:'Times New Roman',serif; font-size:clamp(32px,5vw,52px); font-weight:700; color:var(--blue); margin-bottom:1rem; line-height:1.15; }
    .shop-hero p { font-size:16px; color:var(--mid); max-width:500px; line-height:1.7; }

    .shop-admin-bar { max-width:860px; margin:0 auto; padding:1.5rem 2.5rem; display:none; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .shop-admin-bar.visible { display:flex; }
    .shop-admin-left { display:flex; align-items:center; gap:18px; }
    .shop-admin-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:8px; }
    .shop-admin-label::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); }
    .shop-admin-actions { display:flex; gap:10px; align-items:center; }
    .btn-view-as-member { background:transparent; color:var(--blue); font-size:12px; font-weight:600; letter-spacing:.5px; padding:8px 16px; border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:background .15s,color .15s,border-color .15s; display:flex; align-items:center; gap:6px; }
    .btn-view-as-member:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
    .btn-add-product { background:var(--blue); color:#fff; font-size:12px; font-weight:600; letter-spacing:.5px; padding:8px 18px; border:none; border-radius:4px; cursor:pointer; transition:background .15s; }
    .btn-add-product:hover { background:var(--blue-dark); }
    .btn-signout { background:transparent; color:var(--muted); font-size:12px; font-weight:600; letter-spacing:.5px; padding:8px 14px; border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:color .15s,border-color .15s; }
    .btn-signout:hover { color:var(--black); border-color:var(--muted); }

    .product-grid-wrap { max-width:860px; margin:0 auto; padding:2.5rem 2.5rem; }
    .product-grid-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:1.5rem; }
    .product-grid-title { font-family:'Times New Roman',serif; font-size:1.4rem; color:var(--blue); font-weight:normal; }
    .product-count { font-size:13px; color:var(--muted); }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1.25rem; }

    .product-card { background:var(--white); border:1px solid var(--border); border-radius:6px; overflow:hidden; transition:box-shadow .15s,border-color .15s; cursor:pointer; }
    .product-card:hover { box-shadow:0 4px 16px rgba(24,72,158,.08); border-color:#b8c8e8; }
    .product-card-img { width:100%; height:180px; object-fit:cover; background:var(--bg); display:block; }
    .product-card-img-placeholder { width:100%; height:180px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--border); }
    .product-card-img-placeholder svg { width:40px; height:40px; }
    .product-card-body { padding:1rem; }
    .product-card-category { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--green); margin-bottom:4px; }
    .product-card-name { font-family:'Times New Roman',serif; font-size:1.1rem; color:var(--blue); font-weight:normal; margin-bottom:4px; line-height:1.3; }
    .product-card-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .product-card-footer { display:flex; align-items:center; justify-content:space-between; }
    .product-card-price { font-size:15px; font-weight:600; color:var(--black); }
    .product-card-stock { font-size:11px; color:var(--muted); font-weight:500; }
    .product-card-stock.low { color:#e67e22; }
    .product-card-stock.out { color:#c0392b; }

    .btn-add-to-cart { width:100%; margin-top:10px; background:var(--blue); color:#fff; font-size:12px; font-weight:600; letter-spacing:.5px; padding:8px 0; border:none; border-radius:4px; cursor:pointer; transition:background .15s; text-decoration:none; display:block; text-align:center; box-sizing:border-box; line-height:2; }
    .btn-add-to-cart:hover { background:var(--blue-dark); }
    .btn-add-to-cart:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
    .btn-add-to-cart.sign-in-prompt { background:transparent; color:var(--blue); border:1px solid var(--blue); }
    .btn-add-to-cart.sign-in-prompt:hover { background:var(--blue); color:#fff; }

    .product-card-actions { display:none; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
    .btn-card-edit,.btn-card-delete { font-size:11px; font-weight:600; letter-spacing:.5px; padding:5px 12px; border-radius:3px; cursor:pointer; transition:background .15s,color .15s; }
    .btn-card-edit { background:transparent; color:var(--blue); border:1px solid var(--border); }
    .btn-card-edit:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
    .btn-card-delete { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-card-delete:hover { background:#c0392b; color:#fff; border-color:#c0392b; }

    .product-empty { grid-column:1/-1; text-align:center; padding:4rem 0; color:var(--muted); }
    .product-empty-icon { font-size:2.5rem; margin-bottom:1rem; opacity:.4; }
    .product-empty p { font-size:15px; }

    /* Floating cart button */
    .btn-float-cart { position:fixed; bottom:2rem; right:2rem; z-index:100; background:var(--blue); color:#fff; border:none; border-radius:50px; padding:14px 22px; font-size:14px; font-weight:600; cursor:pointer; box-shadow:0 4px 20px rgba(24,72,158,.3); display:none; align-items:center; gap:10px; transition:background .15s,transform .15s,box-shadow .15s; }
    .btn-float-cart:hover { background:var(--blue-dark); transform:translateY(-2px); box-shadow:0 6px 24px rgba(24,72,158,.4); }
    .btn-float-cart.visible { display:flex; }
    .float-cart-badge { background:var(--green); color:#fff; font-size:11px; font-weight:700; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:0 5px; }

    /* Cart drawer */
    .cart-overlay { display:none; position:fixed; inset:0; background:rgba(10,15,30,.4); z-index:300; }
    .cart-overlay.open { display:block; }
    .cart-drawer { position:fixed; top:0; right:0; bottom:0; width:360px; max-width:100vw; background:var(--white); border-left:1px solid var(--border); box-shadow:-8px 0 32px rgba(10,15,30,.12); z-index:301; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .25s ease; }
    .cart-drawer.open { transform:translateX(0); }
    .cart-drawer-header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .cart-drawer-title { font-family:'Times New Roman',serif; font-size:1.25rem; color:var(--blue); font-weight:normal; }
    .cart-drawer-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; padding:4px; border-radius:3px; transition:color .15s; }
    .cart-drawer-close:hover { color:var(--black); }
    .cart-drawer-body { flex:1; overflow-y:auto; padding:1rem 1.5rem; }
    .cart-empty { text-align:center; padding:3rem 0; color:var(--muted); }
    .cart-empty-icon { font-size:2rem; margin-bottom:.75rem; opacity:.4; }
    .cart-empty p { font-size:14px; }
    .cart-item { display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); }
    .cart-item:last-child { border-bottom:none; }
    .cart-item-img { width:52px; height:52px; object-fit:cover; border-radius:4px; border:1px solid var(--border); background:var(--bg); flex-shrink:0; }
    .cart-item-img-placeholder { width:52px; height:52px; border-radius:4px; border:1px solid var(--border); background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--border); flex-shrink:0; }
    .cart-item-info { flex:1; min-width:0; }
    .cart-item-name { font-family:'Times New Roman',serif; font-size:1rem; color:var(--blue); line-height:1.3; margin-bottom:2px; }
    .cart-item-price { font-size:13px; color:var(--muted); }
    .cart-item-controls { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .cart-qty-btn { width:22px; height:22px; border-radius:3px; border:1px solid var(--border); background:none; font-size:14px; line-height:1; cursor:pointer; color:var(--mid); display:flex; align-items:center; justify-content:center; transition:background .12s,border-color .12s; }
    .cart-qty-btn:hover { background:var(--bg); border-color:var(--blue); color:var(--blue); }
    .cart-qty { font-size:13px; font-weight:600; color:var(--black); min-width:16px; text-align:center; }
    .cart-item-remove { background:none; border:none; cursor:pointer; color:var(--muted); font-size:12px; padding:2px 4px; border-radius:3px; transition:color .12s; margin-left:auto; flex-shrink:0; }
    .cart-item-remove:hover { color:#c0392b; }
    .cart-drawer-footer { padding:1.25rem 1.5rem; border-top:1px solid var(--border); flex-shrink:0; }
    .cart-subtotal { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:1rem; }
    .cart-subtotal-label { font-size:13px; color:var(--muted); }
    .cart-subtotal-amount { font-size:1.1rem; font-weight:600; color:var(--black); }
    .btn-checkout { width:100%; background:var(--blue); color:#fff; font-size:13px; font-weight:600; letter-spacing:.5px; padding:12px 0; border:none; border-radius:4px; cursor:pointer; transition:background .15s; }
    .btn-checkout:hover { background:var(--blue-dark); }

    /* Product detail modal */
    .detail-overlay { display:none; position:fixed; inset:0; background:rgba(10,15,30,.5); z-index:200; align-items:center; justify-content:center; padding:1rem; }
    .detail-overlay.open { display:flex; }
    .detail-modal { background:var(--white); border-radius:8px; border:1px solid var(--border); width:100%; max-width:640px; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(10,15,30,.2); }
    .detail-modal-img { width:100%; height:260px; object-fit:cover; border-radius:8px 8px 0 0; display:block; }
    .detail-modal-img-placeholder { width:100%; height:200px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--border); border-radius:8px 8px 0 0; }
    .detail-modal-body { padding:1.75rem; }
    .detail-modal-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:1.25rem; }
    .detail-modal-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; padding:4px; flex-shrink:0; transition:color .15s; }
    .detail-modal-close:hover { color:var(--black); }
    .detail-modal-category { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--green); margin-bottom:4px; }
    .detail-modal-name { font-family:'Times New Roman',serif; font-size:1.8rem; color:var(--blue); font-weight:normal; line-height:1.2; }
    .detail-modal-price { font-size:1.4rem; font-weight:700; color:var(--black); margin:0.5rem 0; }
    .detail-modal-stock { font-size:12px; font-weight:600; color:var(--muted); }
    .detail-modal-stock.low { color:#e67e22; }
    .detail-modal-stock.out { color:#c0392b; }
    .detail-modal-desc { font-size:15px; color:var(--mid); line-height:1.7; margin:1rem 0; }
    .detail-modal-specs { border-top:1px solid var(--border); padding-top:1rem; margin-top:1rem; }
    .detail-modal-specs-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:.75rem; }
    .detail-modal-spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .detail-modal-spec { background:var(--bg); border-radius:4px; padding:10px 12px; }
    .detail-modal-spec-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
    .detail-modal-spec-value { font-size:13px; font-weight:600; color:var(--black); }
    .detail-modal-footer { padding:0 1.75rem 1.75rem; display:flex; gap:10px; }
    .btn-detail-cart { flex:1; background:var(--blue); color:#fff; font-size:14px; font-weight:600; padding:12px 0; border:none; border-radius:4px; cursor:pointer; transition:background .15s; }
    .btn-detail-cart:hover { background:var(--blue-dark); }
    .btn-detail-cart:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
    .btn-detail-cart.sign-in { background:transparent; color:var(--blue); border:1px solid var(--blue); }
    .btn-detail-cart.sign-in:hover { background:var(--blue); color:#fff; }

    /* Modal (admin add/edit) */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,15,30,.5); z-index:400; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--white); border-radius:8px; border:1px solid var(--border); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(10,15,30,.2); }
    .modal-header { padding:1.5rem 1.5rem 0; display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Times New Roman',serif; font-size:1.3rem; color:var(--blue); font-weight:normal; }
    .modal-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; padding:4px; border-radius:3px; transition:color .15s; }
    .modal-close:hover { color:var(--black); }
    .modal-body { padding:1.5rem; }
    .form-group { margin-bottom:1rem; }
    .form-label { display:block; font-size:12px; font-weight:600; letter-spacing:.5px; color:var(--mid); margin-bottom:5px; text-transform:uppercase; }
    .form-input,.form-textarea,.form-select { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:4px; font-family:'Open Sans',sans-serif; font-size:14px; background:var(--white); color:var(--black); transition:border-color .15s; box-sizing:border-box; }
    .form-input:focus,.form-textarea:focus,.form-select:focus { outline:none; border-color:var(--blue); }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .form-section-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin:1.25rem 0 .75rem; padding-top:1rem; border-top:1px solid var(--border); }
    .form-check-wrap { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .form-check-wrap input[type=checkbox] { width:16px; height:16px; accent-color:var(--blue); cursor:pointer; }
    .form-check-label { font-size:13px; color:var(--mid); cursor:pointer; }
    .modal-save-error { font-size:13px; color:#c0392b; padding:0 1.5rem 1rem; display:none; }
    .modal-footer { padding:0 1.5rem 1.5rem; display:flex; gap:10px; justify-content:flex-end; }
    .btn-modal-cancel { background:transparent; color:var(--muted); font-size:13px; font-weight:600; padding:9px 18px; border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:color .15s; }
    .btn-modal-cancel:hover { color:var(--black); }
    .btn-modal-save { background:var(--blue); color:#fff; font-size:13px; font-weight:600; padding:9px 18px; border:none; border-radius:4px; cursor:pointer; transition:background .15s; }
    .btn-modal-save:hover { background:var(--blue-dark); }

    .shop-loading { display:flex; align-items:center; justify-content:center; min-height:40vh; color:var(--muted); font-size:14px; flex-direction:column; gap:12px; }
    .shop-loading-spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:768px) {
      .form-row,.form-row-3 { grid-template-columns:1fr; }
      .shop-admin-bar { flex-direction:column; gap:12px; align-items:flex-start; }
      .detail-modal-spec-grid { grid-template-columns:1fr; }
      .btn-float-cart { bottom:1.25rem; right:1.25rem; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>
<div class="page-wrap">

  <div class="member-preview-bar" id="member-preview-bar">
    <div class="member-preview-label">Previewing as Member</div>
    <button class="btn-back-admin" id="btn-back-admin">← Back to Admin View</button>
  </div>

  <div class="shop-loading" id="shop-loading">
    <div class="shop-loading-spinner"></div>
    <span>Loading shop...</span>
  </div>

  <div id="shop-wrap" style="display:none;">

    <div class="shop-hero">
      <div class="shop-hero-eyebrow">MCA Shop</div>
      <h1>MCA Shop</h1>
      <p>Official Minecraft Club of America merchandise. More items coming soon.</p>
    </div>

    <div class="shop-admin-bar" id="shop-admin-bar">
      <div class="shop-admin-left">
        <div class="shop-admin-label">Admin Mode</div>
      </div>
      <div class="shop-admin-actions">
        <button class="btn-view-as-member" id="btn-view-as-member">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View as Member
        </button>
        <button class="btn-add-product" id="btn-add-product">+ Add Product</button>
        <button class="btn-signout" id="btn-signout">Sign Out</button>
      </div>
    </div>

    <div class="product-grid-wrap">
      <div class="product-grid-header">
        <div class="product-grid-title">Products</div>
        <div class="product-count" id="product-count"></div>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>

  </div>
</div>

<!-- Floating cart button -->
<button class="btn-float-cart" id="btn-float-cart">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
  View Cart
  <span class="float-cart-badge" id="float-cart-badge">0</span>
</button>

<!-- Cart drawer -->
<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <div class="cart-drawer-title">Your Cart</div>
    <button class="cart-drawer-close" id="cart-drawer-close">✕</button>
  </div>
  <div class="cart-drawer-body" id="cart-drawer-body">
    <div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty.</p></div>
  </div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none;">
    <div class="cart-subtotal">
      <span class="cart-subtotal-label">Subtotal</span>
      <span class="cart-subtotal-amount" id="cart-subtotal">$0.00</span>
    </div>
    <button class="btn-checkout">Checkout — Coming Soon</button>
  </div>
</div>

<!-- Product detail modal -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-modal" id="detail-modal">
    <div id="detail-modal-inner"></div>
  </div>
</div>

<!-- Admin add/edit product modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-product-id">

      <div class="form-section-label" style="border-top:none;margin-top:0;padding-top:0;">Basic Info</div>
      <div class="form-group">
        <label class="form-label" for="modal-name">Product Name</label>
        <input type="text" id="modal-name" class="form-input" placeholder="e.g. MCA Logo T-Shirt">
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-desc">Description</label>
        <textarea id="modal-desc" class="form-textarea" placeholder="Full product description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-price">Price (USD)</label>
          <input type="number" id="modal-price" class="form-input" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-inventory">Inventory</label>
          <input type="number" id="modal-inventory" class="form-input" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-category">Category</label>
          <input type="text" id="modal-category" class="form-input" placeholder="e.g. Apparel, 3D Print">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-active">Status</label>
          <select id="modal-active" class="form-select">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
      </div>

      <div class="form-section-label">Images</div>
      <div class="form-group">
        <label class="form-label" for="modal-image">Primary Image URL</label>
        <input type="text" id="modal-image" class="form-input" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-image2">Secondary Image URL (optional)</label>
        <input type="text" id="modal-image2" class="form-input" placeholder="https://...">
      </div>

      <div class="form-section-label">Specifications</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-weight">Weight</label>
          <input type="text" id="modal-weight" class="form-input" placeholder="e.g. 200g">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-dimensions">Dimensions</label>
          <input type="text" id="modal-dimensions" class="form-input" placeholder="e.g. 10 x 5 x 2 cm">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-material">Material</label>
          <input type="text" id="modal-material" class="form-input" placeholder="e.g. 100% Cotton">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-sizes">Available Sizes</label>
          <input type="text" id="modal-sizes" class="form-input" placeholder="e.g. S, M, L, XL">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-colors">Colors</label>
          <input type="text" id="modal-colors" class="form-input" placeholder="e.g. Black, White">
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-sku">SKU</label>
          <input type="text" id="modal-sku" class="form-input" placeholder="e.g. MCA-001">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-notes">Admin Notes (internal)</label>
        <input type="text" id="modal-notes" class="form-input" placeholder="Not shown to members">
      </div>

      <div class="form-section-label">Cart Settings</div>
      <div class="form-check-wrap">
        <input type="checkbox" id="modal-cart-enabled" checked>
        <label class="form-check-label" for="modal-cart-enabled">Allow "Add to Cart" for this product</label>
      </div>

    </div>
    <div class="modal-save-error" id="modal-save-error"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-modal-save" id="modal-save">Save Product</button>
    </div>
  </div>
</div>

<script type="module">
  import { supabase, isAdmin, signOut } from './supabase.js';

  let _isAdmin = false, _isLoggedIn = false, _userId = null, _memberPreview = false, _initialized = false;

  // ── Cart
  function cartKey() { return 'mca_cart_' + _userId; }
  function getCart() { if (!_userId) return []; try { return JSON.parse(localStorage.getItem(cartKey())) || []; } catch(e) { return []; } }
  function saveCart(items) {
    if (!_userId) return;
    localStorage.setItem(cartKey(), JSON.stringify(items));
    updateFloatCart();
    if (window._mcaUpdateCartBadge) window._mcaUpdateCartBadge();
  }
  function addToCart(product) {
    const items = getCart(), ex = items.find(i => i.id === product.id);
    if (ex) { ex.qty = (ex.qty || 1) + 1; } else { items.push({...product, qty: 1}); }
    saveCart(items); renderCartDrawer(); openCartDrawer();
  }
  function removeFromCart(id) { saveCart(getCart().filter(i => i.id !== id)); renderCartDrawer(); }
  function changeQty(id, d) {
    const items = getCart(), item = items.find(i => i.id === id);
    if (!item) return; item.qty = Math.max(1, (item.qty || 1) + d);
    saveCart(items); renderCartDrawer();
  }
  window.cartQty    = (id, d) => changeQty(id, d);
  window.cartRemove = (id)    => removeFromCart(id);
  window.shopAddToCart = (p)  => addToCart(p);

  function updateFloatCart() {
    const items = getCart();
    const total = items.reduce((s, i) => s + (i.qty || 1), 0);
    const btn   = document.getElementById('btn-float-cart');
    const badge = document.getElementById('float-cart-badge');
    if (!_isLoggedIn || total === 0) { btn.classList.remove('visible'); return; }
    btn.classList.add('visible');
    badge.textContent = total > 99 ? '99+' : total;
  }

  // ── Cart drawer
  const elCartOverlay  = document.getElementById('cart-overlay');
  const elCartDrawer   = document.getElementById('cart-drawer');
  const elCartBody     = document.getElementById('cart-drawer-body');
  const elCartFooter   = document.getElementById('cart-drawer-footer');
  const elCartSubtotal = document.getElementById('cart-subtotal');
  function openCartDrawer()  { elCartOverlay.classList.add('open'); elCartDrawer.classList.add('open'); }
  function closeCartDrawer() { elCartOverlay.classList.remove('open'); elCartDrawer.classList.remove('open'); }
  document.getElementById('cart-drawer-close').addEventListener('click', closeCartDrawer);
  document.getElementById('btn-float-cart').addEventListener('click', () => { renderCartDrawer(); openCartDrawer(); });
  elCartOverlay.addEventListener('click', closeCartDrawer);
  const navCartBtn = document.getElementById('nav-cart-btn');
  if (navCartBtn) navCartBtn.addEventListener('click', () => { renderCartDrawer(); openCartDrawer(); });

  function renderCartDrawer() {
    const items = getCart();
    if (!items.length) { elCartBody.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty.</p></div>'; elCartFooter.style.display = 'none'; return; }
    const sub = items.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
    elCartBody.innerHTML = items.map(i => `
      <div class="cart-item">
        ${i.image_url ? `<img class="cart-item-img" src="${i.image_url}" alt="${i.name}">` : `<div class="cart-item-img-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-price">$${Number(i.price).toFixed(2)} each</div>
          <div class="cart-item-controls">
            <button class="cart-qty-btn" onclick="cartQty('${i.id}',-1)">−</button>
            <span class="cart-qty">${i.qty || 1}</span>
            <button class="cart-qty-btn" onclick="cartQty('${i.id}',1)">+</button>
            <button class="cart-item-remove" onclick="cartRemove('${i.id}')">Remove</button>
          </div>
        </div>
      </div>`).join('');
    elCartSubtotal.textContent = '$' + sub.toFixed(2);
    elCartFooter.style.display = '';
  }

  // ── Product detail modal
  const elDetailOverlay = document.getElementById('detail-overlay');
  const elDetailInner   = document.getElementById('detail-modal-inner');
  function openDetail(p) {
    const showCart = p.cart_enabled !== false && !(_isAdmin && !_memberPreview);
    const specs = [
      p.weight      && { label: 'Weight',     value: p.weight },
      p.dimensions  && { label: 'Dimensions', value: p.dimensions },
      p.material    && { label: 'Material',   value: p.material },
      p.sizes       && { label: 'Sizes',      value: p.sizes },
      p.colors      && { label: 'Colors',     value: p.colors },
      p.sku         && { label: 'SKU',        value: p.sku },
    ].filter(Boolean);

    let cartBtn = '';
    if (showCart) {
      if (_isLoggedIn) {
        const prod = JSON.stringify({id:p.id,name:p.name,price:p.price,image_url:p.image_url||null}).replace(/"/g,'&quot;');
        cartBtn = `<button class="btn-detail-cart" ${p.inventory===0?'disabled':''} onclick='shopAddToCart(${prod});closeDetail();'>${p.inventory===0?'Out of Stock':'Add to Cart'}</button>`;
      } else {
        cartBtn = `<a class="btn-detail-cart sign-in" href="login.html?return=shop.html">Sign In to Add to Cart</a>`;
      }
    }

    elDetailInner.innerHTML = `
      ${p.image_url ? `<img class="detail-modal-img" src="${p.image_url}" alt="${p.name}">` : `<div class="detail-modal-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg></div>`}
      <div class="detail-modal-body">
        <div class="detail-modal-header">
          <div>
            ${p.category ? `<div class="detail-modal-category">${p.category}</div>` : ''}
            <div class="detail-modal-name">${p.name}</div>
          </div>
          <button class="detail-modal-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-modal-price">$${Number(p.price).toFixed(2)}</div>
        <div class="detail-modal-stock ${p.inventory===0?'out':p.inventory<5?'low':''}">${p.inventory===0?'Out of stock':`${p.inventory} in stock`}</div>
        ${p.description ? `<div class="detail-modal-desc">${p.description}</div>` : ''}
        ${specs.length ? `
          <div class="detail-modal-specs">
            <div class="detail-modal-specs-title">Specifications</div>
            <div class="detail-modal-spec-grid">
              ${specs.map(s => `<div class="detail-modal-spec"><div class="detail-modal-spec-label">${s.label}</div><div class="detail-modal-spec-value">${s.value}</div></div>`).join('')}
            </div>
          </div>` : ''}
      </div>
      ${cartBtn ? `<div class="detail-modal-footer">${cartBtn}</div>` : ''}`;
    elDetailOverlay.classList.add('open');
  }
  window.closeDetail = () => elDetailOverlay.classList.remove('open');
  elDetailOverlay.addEventListener('click', e => { if (e.target === elDetailOverlay) closeDetail(); });

  // ── Element refs
  const elLoading    = document.getElementById('shop-loading');
  const elShop       = document.getElementById('shop-wrap');
  const elAdminBar   = document.getElementById('shop-admin-bar');
  const elPreviewBar = document.getElementById('member-preview-bar');
  const elGrid       = document.getElementById('product-grid');
  const elCount      = document.getElementById('product-count');
  const elModal      = document.getElementById('product-modal');
  const elModalTitle = document.getElementById('modal-title');

  function applyState() {
    const showAdmin = _isAdmin && !_memberPreview;
    elAdminBar.classList.toggle('visible', showAdmin);
    elPreviewBar.classList.toggle('active', _isAdmin && _memberPreview);
    document.body.classList.toggle('admin-mode', showAdmin);
    document.body.classList.toggle('member-preview', _memberPreview);
  }

  async function init(user, accessToken) {
    _isLoggedIn = !!user; _userId = user?.id || null;
    _isAdmin    = _isLoggedIn ? await isAdmin(_userId, accessToken) : false;
    elLoading.style.display = 'none'; elShop.style.display = 'block';
    applyState(); loadProducts(); updateFloatCart();
  }

  elLoading.style.display = 'flex'; elShop.style.display = 'none';

  supabase.auth.onAuthStateChange(async (event, session) => {
    if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && !_initialized) {
      _initialized = true;
      await init(session?.user || null, session?.access_token || null);
    } else if (event === 'SIGNED_OUT') {
      _initialized = false; _isAdmin = false; _isLoggedIn = false; _userId = null; _memberPreview = false;
      elLoading.style.display = 'none'; elShop.style.display = 'block';
      applyState(); loadProducts(); updateFloatCart();
    }
  });

  // Fallback: INITIAL_SESSION may have fired before this listener registered (e.g. nav.js
  // initialises the Supabase client first). If so, init manually from getSession().
  if (!_initialized) {
    const { data: { session } } = await supabase.auth.getSession();
    if (!_initialized) {
      _initialized = true;
      await init(session?.user || null, session?.access_token || null);
    }
  }

  document.getElementById('btn-view-as-member').addEventListener('click', () => { _memberPreview = true; applyState(); loadProducts(); });
  document.getElementById('btn-back-admin').addEventListener('click',     () => { _memberPreview = false; applyState(); loadProducts(); });
  document.getElementById('btn-signout').addEventListener('click', async () => await signOut());

  // ── Load products
  async function loadProducts() {
    const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
    if (error) { elGrid.innerHTML = `<div class="product-empty"><p>Error: ${error.message}</p></div>`; return; }
    const visible = _isAdmin ? data : data.filter(p => p.active);
    elCount.textContent = visible.length === 1 ? '1 product' : `${visible.length} products`;
    if (!visible.length) { elGrid.innerHTML = `<div class="product-empty"><div class="product-empty-icon">📦</div><p>${_isAdmin ? 'No products yet.' : 'No products available yet.'}</p></div>`; return; }
    const showAdmin = _isAdmin && !_memberPreview;
    elGrid.innerHTML = visible.map(p => {
      const cartAllowed = p.cart_enabled !== false;
      let cartBtn = '';
      if (cartAllowed) {
        if (_isLoggedIn) {
          const prod = JSON.stringify({id:p.id,name:p.name,price:p.price,image_url:p.image_url||null}).replace(/"/g,'&quot;');
          cartBtn = `<button class="btn-add-to-cart" ${p.inventory===0?'disabled':''} onclick='event.stopPropagation();shopAddToCart(${prod})'>${p.inventory===0?'Out of Stock':'Add to Cart'}</button>`;
        } else {
          cartBtn = `<a class="btn-add-to-cart sign-in-prompt" href="login.html?return=shop.html" onclick="event.stopPropagation()">Sign In to Add to Cart</a>`;
        }
      }
      return `<div class="product-card" onclick="openProductDetail('${p.id}')">
        ${p.image_url ? `<img class="product-card-img" src="${p.image_url}" alt="${p.name}">` : `<div class="product-card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg></div>`}
        <div class="product-card-body">
          ${p.category ? `<div class="product-card-category">${p.category}</div>` : ''}
          <div class="product-card-name">${p.name}</div>
          ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
          <div class="product-card-footer">
            <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
            <div class="product-card-stock ${p.inventory===0?'out':p.inventory<5?'low':''}">${p.inventory===0?'Out of stock':`${p.inventory} in stock`}</div>
          </div>
          ${cartBtn}
          ${showAdmin ? `<div class="product-card-actions" style="display:flex;">
            <button class="btn-card-edit" onclick="event.stopPropagation();openEdit('${p.id}')">Edit</button>
            <button class="btn-card-delete" onclick="event.stopPropagation();deleteProduct('${p.id}')">Delete</button>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Store products in memory for detail modal
  let _products = [];
  const _origLoad = loadProducts;
  window.openProductDetail = async (id) => {
    let p = _products.find(x => x.id === id);
    if (!p) { const { data } = await supabase.from('products').select('*').eq('id', id).single(); p = data; }
    if (p) openDetail(p);
  };
  // Patch loadProducts to cache results
  async function loadProducts() {
    const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
    if (error) { elGrid.innerHTML = `<div class="product-empty"><p>Error: ${error.message}</p></div>`; return; }
    _products = data || [];
    const visible = _isAdmin ? _products : _products.filter(p => p.active);
    elCount.textContent = visible.length === 1 ? '1 product' : `${visible.length} products`;
    if (!visible.length) { elGrid.innerHTML = `<div class="product-empty"><div class="product-empty-icon">📦</div><p>${_isAdmin ? 'No products yet.' : 'No products available yet.'}</p></div>`; return; }
    const showAdmin = _isAdmin && !_memberPreview;
    elGrid.innerHTML = visible.map(p => {
      const cartAllowed = p.cart_enabled !== false;
      let cartBtn = '';
      if (cartAllowed) {
        if (_isLoggedIn) {
          const prod = JSON.stringify({id:p.id,name:p.name,price:p.price,image_url:p.image_url||null}).replace(/"/g,'&quot;');
          cartBtn = `<button class="btn-add-to-cart" ${p.inventory===0?'disabled':''} onclick='event.stopPropagation();shopAddToCart(${prod})'>${p.inventory===0?'Out of Stock':'Add to Cart'}</button>`;
        } else {
          cartBtn = `<a class="btn-add-to-cart sign-in-prompt" href="login.html?return=shop.html" onclick="event.stopPropagation()">Sign In to Add to Cart</a>`;
        }
      }
      return `<div class="product-card" onclick="openProductDetail('${p.id}')">
        ${p.image_url ? `<img class="product-card-img" src="${p.image_url}" alt="${p.name}">` : `<div class="product-card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/></svg></div>`}
        <div class="product-card-body">
          ${p.category ? `<div class="product-card-category">${p.category}</div>` : ''}
          <div class="product-card-name">${p.name}</div>
          ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
          <div class="product-card-footer">
            <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
            <div class="product-card-stock ${p.inventory===0?'out':p.inventory<5?'low':''}">${p.inventory===0?'Out of stock':`${p.inventory} in stock`}</div>
          </div>
          ${cartBtn}
          ${showAdmin ? `<div class="product-card-actions" style="display:flex;">
            <button class="btn-card-edit" onclick="event.stopPropagation();openEdit('${p.id}')">Edit</button>
            <button class="btn-card-delete" onclick="event.stopPropagation();deleteProduct('${p.id}')">Delete</button>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ── Admin modal
  function openModal(product = null) {
    document.getElementById('modal-product-id').value  = product?.id || '';
    document.getElementById('modal-name').value        = product?.name || '';
    document.getElementById('modal-desc').value        = product?.description || '';
    document.getElementById('modal-price').value       = product?.price || '';
    document.getElementById('modal-inventory').value   = product?.inventory ?? '';
    document.getElementById('modal-category').value    = product?.category || '';
    document.getElementById('modal-active').value      = product ? String(product.active) : 'true';
    document.getElementById('modal-image').value       = product?.image_url || '';
    document.getElementById('modal-image2').value      = product?.image_url2 || '';
    document.getElementById('modal-weight').value      = product?.weight || '';
    document.getElementById('modal-dimensions').value  = product?.dimensions || '';
    document.getElementById('modal-material').value    = product?.material || '';
    document.getElementById('modal-sizes').value       = product?.sizes || '';
    document.getElementById('modal-colors').value      = product?.colors || '';
    document.getElementById('modal-sku').value         = product?.sku || '';
    document.getElementById('modal-notes').value       = product?.admin_notes || '';
    document.getElementById('modal-cart-enabled').checked = product ? (product.cart_enabled !== false) : true;
    document.getElementById('modal-save-error').style.display = 'none';
    elModalTitle.textContent = product ? 'Edit Product' : 'Add Product';
    elModal.classList.add('open');
  }
  function closeModal() { elModal.classList.remove('open'); }
  document.getElementById('btn-add-product').addEventListener('click', () => openModal());
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  elModal.addEventListener('click', e => { if (e.target === elModal) closeModal(); });

  document.getElementById('modal-save').addEventListener('click', async () => {
    const id        = document.getElementById('modal-product-id').value;
    const name      = document.getElementById('modal-name').value.trim();
    const desc      = document.getElementById('modal-desc').value.trim();
    const price     = parseFloat(document.getElementById('modal-price').value);
    const inventory = parseInt(document.getElementById('modal-inventory').value, 10);
    const category  = document.getElementById('modal-category').value.trim();
    const active    = document.getElementById('modal-active').value === 'true';
    const image_url = document.getElementById('modal-image').value.trim();
    const image_url2   = document.getElementById('modal-image2').value.trim();
    const weight       = document.getElementById('modal-weight').value.trim();
    const dimensions   = document.getElementById('modal-dimensions').value.trim();
    const material     = document.getElementById('modal-material').value.trim();
    const sizes        = document.getElementById('modal-sizes').value.trim();
    const colors       = document.getElementById('modal-colors').value.trim();
    const sku          = document.getElementById('modal-sku').value.trim();
    const admin_notes  = document.getElementById('modal-notes').value.trim();
    const cart_enabled = document.getElementById('modal-cart-enabled').checked;
    const errEl = document.getElementById('modal-save-error');
    if (!name || isNaN(price) || isNaN(inventory)) { errEl.textContent = 'Name, price, and inventory are required.'; errEl.style.display = 'block'; return; }
    const payload = { name, description:desc||null, price, inventory, category:category||null, active, image_url:image_url||null, image_url2:image_url2||null, weight:weight||null, dimensions:dimensions||null, material:material||null, sizes:sizes||null, colors:colors||null, sku:sku||null, admin_notes:admin_notes||null, cart_enabled };
    const { error } = id
      ? await supabase.from('products').update(payload).eq('id', id)
      : await supabase.from('products').insert(payload);
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
    closeModal(); loadProducts();
  });

  window.openEdit = async (id) => {
    const { data } = await supabase.from('products').select('*').eq('id', id).single();
    if (data) openModal(data);
  };
  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product? This cannot be undone.')) return;
    await supabase.from('products').delete().eq('id', id);
    loadProducts();
  };
</script>
</body>
</html>
