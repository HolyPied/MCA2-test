name: Discord Website Update Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history for file list)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          SITE_URL="https://mc.minecraftclubofamerica.me"
          COMMIT_URL="https://github.com/$REPO/commit/$SHA"

          # Get changed file names only (no diffs)
          FILES=$(git diff-tree --no-commit-id --name-only -r $SHA)
          FILE_LIST=$(echo "$FILES" | head -n 15 | sed 's/^/- /')

          # Clean commit message for Discord
          COMMIT_MSG=$(echo "$COMMIT_MSG" | tr '\n' ' ' | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 Website Updated\",
              \"color\": 5814783,
              \"fields\": [
                {
                  \"name\": \"👤 Updated By\",
                  \"value\": \"$ACTOR\",
                  \"inline\": true
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"$COMMIT_MSG\"
                },
                {
                  \"name\": \"📄 Changed Files\",
                  \"value\": \"${FILE_LIST:-No file changes detected}\"
                }
              ],
              \"footer\": {
                \"text\": \"GitHub Pages Deployment Notification\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }],
            \"components\": [
              {
                \"type\": 1,
                \"components\": [
                  {
                    \"type\": 2,
                    \"style\": 5,
                    \"label\": \"🌐 Open Website\",
                    \"url\": \"$SITE_URL\"
                  }
                ]
              }
            ]
          }" \
          $DISCORD_WEBHOOK