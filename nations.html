<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nations — Minecraft Club of America</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/icon.ico">
</head>
<body>

<!-- nav + footer injected by nav.js -->

<div class="page-wrap">

  <div class="hero">
    <div class="hero-eyebrow">Global Dawn</div>
    <h1>Nations of<br><em>The World</em></h1>
    <p class="hero-sub">The sovereign nations of Global Dawn — each with their own government, territory, and story.</p>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-label">Member Nations</div>
      <h2>Recognized Nations</h2>
      <p>All nations currently recognized by the Minecraft Club of America on the Global Dawn server.</p>
      <div class="nations-grid" id="nations-grid">
        <p class="loading-msg" style="grid-column:1/-1;color:var(--mid);font-size:14px;">Loading nations…</p>
      </div>
    </div>

    <div id="nation-detail-section" style="display:none;">
      <div class="section">
        <div class="section-label" id="nation-detail-label">Nation</div>
        <h2 id="nation-detail-name"></h2>
        <div id="nation-detail-body" class="nation-detail-body"></div>
        <button class="nation-back-btn" onclick="closeNationDetail()">← Back to all nations</button>
      </div>
    </div>
  </div>

</div>

<script src="nav.js"></script>
<script src="nations.js"></script>
</body>
</html>
