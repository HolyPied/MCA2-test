name: Discord Website Deployment Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: commit
        run: |
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)" >> $GITHUB_ENV

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          SHA="$COMMIT_SHA"
          ACTOR="$COMMIT_AUTHOR"

          COMMIT_URL="https://github.com/$REPO/commit/$SHA"
          SITE_URL="https://mc.minecraftclubofamerica.me"

          # escape quotes/newlines safely
          MSG=$(echo "$COMMIT_MSG" | sed ':a;N;$!ba;s/"/\\"/g;s/\n/\\n/g')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 Website Updated\",
              \"color\": 5763719,
              \"fields\": [
                {
                  \"name\": \"👤 Author\",
                  \"value\": \"$ACTOR\",
                  \"inline\": true
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"$MSG\"
                }
              ],
              \"footer\": {
                \"text\": \"GitHub Pages Update Notification\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"🌐 View Website\",
                  \"url\": \"$SITE_URL\"
                },
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"📦 View Commit\",
                  \"url\": \"$COMMIT_URL\"
                }
              ]
            }]
          }" \
          $DISCORD_WEBHOOK