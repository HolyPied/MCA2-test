name: Discord Website Update Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          SITE_URL="https://mc.minecraftclubofamerica.me"
          COMMIT_URL="https://github.com/$REPO/commit/$SHA"

          # Clean message so Discord doesn't break formatting
          COMMIT_MSG=$(echo "$COMMIT_MSG" | tr '\n' ' ' | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 Website Updated\",
              \"color\": 5814783,
              \"fields\": [
                {
                  \"name\": \"👤 Updated By\",
                  \"value\": \"$ACTOR\",
                  \"inline\": true
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"$COMMIT_MSG\"
                }
              ],
              \"footer\": {
                \"text\": \"GitHub Pages Deployment Notification\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"🌐 Open Website\",
                  \"url\": \"$SITE_URL\"
                },
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"📦 View Commit\",
                  \"url\": \"$COMMIT_URL\"
                }
              ]
            }]
          }" \
          $DISCORD_WEBHOOK