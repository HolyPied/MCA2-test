name: Discord Website Deployment Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          COMMIT_URL="https://github.com/$REPO/commit/$SHA"
          SITE_URL="https://mc.minecraftclubofamerica.me"

          # clean formatting so Discord doesn't break it
          COMMIT_MSG=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | tr '\n' ' ')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 Website Updated\",
              \"color\": 3447003,
              \"fields\": [
                {
                  \"name\": \"👤 Updated By\",
                  \"value\": \"$ACTOR\",
                  \"inline\": true
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"$COMMIT_MSG\"
                }
              ],
              \"footer\": {
                \"text\": \"GitHub Pages Deployment\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"🌐 Open Website\",
                  \"url\": \"$SITE_URL\"
                },
                {
                  \"type\": 2,
                  \"style\": 5,
                  \"label\": \"📦 View Commit\",
                  \"url\": \"$COMMIT_URL\"
                }
              ]
            }]
          }" \
          $DISCORD_WEBHOOK